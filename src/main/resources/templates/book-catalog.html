<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Book Catalog – Page Carnival</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #eee; margin-bottom: 30px; }
        nav span { font-weight: bold; font-size: 1.1em; color: #333; }
        .nav-links a { margin-left: 16px; color: #4a90d9; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
        h2 { color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f4f4f4; padding: 10px 12px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover td { background: #fafafa; }
        .empty-msg { color: #888; text-align: center; padding: 30px 0; }
        .qty-form { display: flex; align-items: center; gap: 6px; }
        .qty-input { width: 56px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .btn { display: inline-block; padding: 5px 14px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
        .btn:hover { background: #357abd; }
        .logout-form { display: inline; }
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1em; padding: 0; }
        .logout-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <span>Page Carnival — Buyer</span>
        <div class="nav-links">
            <a th:href="@{/buyer/dashboard}">Dashboard</a>
            <a th:href="@{/buyer/cart}">My Cart</a>
            <a th:href="@{/buyer/orders/history}">Order History</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <h2>Book Catalog</h2>

    <div th:if="${#lists.isEmpty(books)}" class="empty-msg">
        <p>No books are available at the moment. Check back soon!</p>
    </div>

    <table th:if="${!#lists.isEmpty(books)}">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Category</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Add to Cart</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="book : ${books}">
                <td th:text="${book.title}"></td>
                <td th:text="${book.author}"></td>
                <td th:text="${book.category}"></td>
                <td th:text="'$' + ${book.price}"></td>
                <td th:text="${book.stock}"></td>
                <td>
                    <form th:action="@{/buyer/cart/add}" method="post" class="qty-form">
                        <input type="hidden" name="bookId" th:value="${book.id}" />
                        <input class="qty-input" type="number" name="quantity" value="1" min="1" th:max="${book.stock}" />
                        <button class="btn" type="submit" th:disabled="${book.stock == 0}">
                            <span th:text="${book.stock == 0} ? 'Out of Stock' : 'Add to Cart'"></span>
                        </button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
</body>
</html>
