<h2>Book Catalog</h2>

<table>
<tr>
<th>Title</th>
<th>Author</th>
<th>Price</th>
</tr>

<tr th:each="book : ${books}">
<form th:action="@{/buyer/cart/add}" method="post">
    <input type="hidden" name="bookId" th:value="${book.id}" />
    <input type="number" name="quantity" value="1" min="1" />
    <button type="submit">Add to Cart</button>
</form>
</tr>

</table>
