<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register – Page Carnival</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 420px; margin: 80px auto; }
        h2 { color: #333; }
        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; }
        input, select { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #4a90d9; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
        button:hover { background: #357abd; }
        .links { margin-top: 14px; text-align: center; }
    </style>
</head>
<body>
    <h2>Create Account</h2>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" th:field="*{fullName}" placeholder="John Doe" required />
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" th:field="*{email}" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" th:field="*{password}" placeholder="Password" required />
        </div>
        <div class="form-group">
            <label for="role">Role</label>
            <select id="role" th:field="*{role}">
                <option th:each="role : ${roles}" th:value="${role}" th:text="${role}"></option>
            </select>
        </div>
        <button type="submit">Register</button>
    </form>

    <div class="links">
        <p>Already have an account? <a th:href="@{/login}">Login</a></p>
    </div>
</body>
</html>
