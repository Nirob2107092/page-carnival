<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Cart – Page Carnival</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #eee; margin-bottom: 30px; }
        nav span { font-weight: bold; font-size: 1.1em; color: #333; }
        .nav-links a { margin-left: 16px; color: #4a90d9; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
        h2 { color: #333; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f4f4f4; padding: 10px 12px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        tr:hover td { background: #fafafa; }
        .update-form { display: flex; align-items: center; gap: 6px; }
        .qty-input { width: 56px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; }
        .btn { display: inline-block; padding: 6px 14px; background: #4a90d9; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.9em; text-decoration: none; }
        .btn:hover { background: #357abd; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-success { background: #27ae60; font-size: 1em; padding: 10px 28px; }
        .btn-success:hover { background: #219150; }
        .total-bar { display: flex; justify-content: flex-end; align-items: center; gap: 16px; margin: 20px 0; font-size: 1.1em; font-weight: bold; }
        .empty-msg { color: #888; text-align: center; padding: 30px 0; }
        .bottom-links { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .logout-form { display: inline; }
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1em; padding: 0; }
        .logout-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <nav>
        <span>Page Carnival — Buyer</span>
        <div class="nav-links">
            <a th:href="@{/buyer/dashboard}">Dashboard</a>
            <a th:href="@{/buyer/catalog}">Browse Books</a>
            <a th:href="@{/buyer/orders/history}">Order History</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <h2>My Cart</h2>

    <div th:if="${#lists.isEmpty(cart.items)}" class="empty-msg">
        <p>Your cart is empty. <a th:href="@{/buyer/catalog}">Browse books</a> to add some!</p>
    </div>

    <div th:if="${!#lists.isEmpty(cart.items)}">
        <table>
            <thead>
                <tr>
                    <th>Book</th>
                    <th>Unit Price</th>
                    <th>Quantity</th>
                    <th>Subtotal</th>
                    <th>Remove</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${cart.items}">
                    <td th:text="${item.title}"></td>
                    <td th:text="'$' + ${item.price}"></td>
                    <td>
                        <form th:action="@{/buyer/cart/update}" method="post" class="update-form">
                            <input type="hidden" name="_method" value="PATCH" />
                            <input type="hidden" name="bookId" th:value="${item.bookId}" />
                            <input class="qty-input" type="number" name="quantity" th:value="${item.quantity}" min="1" />
                            <button class="btn" type="submit">Update</button>
                        </form>
                    </td>
                    <td th:text="'$' + ${item.subtotal}"></td>
                    <td>
                        <form th:action="@{/buyer/cart/remove/{id}(id=${item.bookId})}" method="post"
                              style="display:inline;"
                              onsubmit="return confirm('Remove this item?')">
                            <input type="hidden" name="_method" value="DELETE" />
                            <button type="submit" class="btn btn-danger">Remove</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="total-bar">
            <span>Total:</span>
            <span th:text="'$' + ${cart.total}"></span>
        </div>

        <div class="bottom-links">
            <a class="btn" th:href="@{/buyer/catalog}">Continue Shopping</a>
            <div style="display:flex; gap:10px;">
                <form th:action="@{/buyer/cart/clear}" method="post"
                      onsubmit="return confirm('Clear entire cart?')">
                    <input type="hidden" name="_method" value="DELETE" />
                    <button type="submit" class="btn btn-danger">Clear Cart</button>
                </form>
                <form th:action="@{/buyer/orders/place}" method="post">
                    <button class="btn btn-success" type="submit">Place Order</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
