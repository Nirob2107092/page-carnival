<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login – Page Carnival</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 80px auto; }
        h2 { color: #333; }
        .form-group { margin-bottom: 14px; }
        label { display: block; margin-bottom: 4px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #4a90d9; color: white; border: none; border-radius: 4px; font-size: 1em; cursor: pointer; }
        button:hover { background: #357abd; }
        .msg-error { color: red; margin-bottom: 12px; }
        .msg-success { color: green; margin-bottom: 12px; }
        .links { margin-top: 14px; text-align: center; }
    </style>
</head>
<body>
    <h2>Login</h2>

    <div th:if="${param.error}" class="msg-error">Invalid email or password.</div>
    <div th:if="${param.logout}" class="msg-success">You have been logged out.</div>
    <div th:if="${param.registered}" class="msg-success">Registration successful. Please log in.</div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label for="username">Email</label>
            <input type="text" id="username" name="username" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Password" required />
        </div>
        <button type="submit">Login</button>
    </form>

    <div class="links">
        <p>Don't have an account? <a th:href="@{/register}">Register here</a></p>
    </div>
</body>
</html>
