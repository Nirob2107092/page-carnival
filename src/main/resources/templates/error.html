<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error – Page Carnival</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; text-align: center; }
        .error-box { border: 1px solid #ddd; border-radius: 8px; padding: 40px 32px; background: #fafafa; }
        .status-code { font-size: 4em; font-weight: bold; color: #e74c3c; margin: 0 0 8px; }
        h2 { color: #333; margin: 0 0 16px; }
        p { color: #666; margin-bottom: 28px; font-size: 1.05em; }
        .btn { display: inline-block; padding: 10px 24px; background: #4a90d9; color: white;
               text-decoration: none; border-radius: 4px; font-size: 1em; }
        .btn:hover { background: #357abd; }
    </style>
</head>
<body>
    <div class="error-box">
        <div class="status-code" th:text="${statusCode}">Error</div>
        <h2 th:text="${errorTitle}">Something went wrong</h2>
        <p th:text="${errorMessage}">An unexpected error occurred.</p>
        <a class="btn" th:href="${backLink}" th:text="${backText}">Go Back</a>
    </div>
</body>
</html>
