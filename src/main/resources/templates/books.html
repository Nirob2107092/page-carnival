<h2>Books</h2>

<a href="/seller/books/create">Add Book</a>

<table>
<tr>
<th>Title</th>
<th>Author</th>
<th>Price</th>
<th>Actions</th>
</tr>

<tr th:each="book : ${books}">
<td th:text="${book.title}"></td>
<td th:text="${book.author}"></td>
<td th:text="${book.price}"></td>
<td>
<a th:href="@{/seller/books/edit/{id}(id=${book.id})}">Edit</a>
<a th:href="@{/seller/books/delete/{id}(id=${book.id})}">Delete</a>
</td>
</tr>

</table>
