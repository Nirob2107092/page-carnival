<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Page Carnival</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 60px auto; text-align: center; }
        h1 { color: #333; }
        p { color: #666; font-size: 1.1em; }
        .btn { display: inline-block; margin: 10px; padding: 12px 28px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; font-size: 1em; }
        .btn:hover { background: #357abd; }
    </style>
</head>
<body>
    <h1>Welcome to Page Carnival</h1>
    <p>A digital book marketplace — discover, buy, and sell books.</p>
    <div>
        <a class="btn" th:href="@{/login}">Login</a>
        <a class="btn" th:href="@{/register}">Register</a>
    </div>
</body>
</html>
