<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order History – Page Carnival</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 2px solid #eee; margin-bottom: 30px; }
        nav span { font-weight: bold; font-size: 1.1em; color: #333; }
        .nav-links a { margin-left: 16px; color: #4a90d9; text-decoration: none; }
        .nav-links a:hover { text-decoration: underline; }
        h2 { color: #333; margin-bottom: 20px; }
        .order-card { border: 1px solid #ddd; border-radius: 8px; margin-bottom: 24px; overflow: hidden; }
        .order-header { background: #f4f4f4; padding: 12px 16px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
        .order-header span { color: #555; font-size: 0.95em; }
        .order-header strong { color: #333; }
        .status-PENDING { color: #e67e22; font-weight: bold; }
        .status-CONFIRMED { color: #27ae60; font-weight: bold; }
        .status-CANCELLED { color: #e74c3c; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fafafa; padding: 8px 14px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9em; color: #666; }
        td { padding: 8px 14px; border-bottom: 1px solid #f0f0f0; font-size: 0.95em; }
        .empty-msg { color: #888; text-align: center; padding: 40px 0; }
        .logout-form { display: inline; }
        .logout-btn { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 1em; padding: 0; }
        .logout-btn:hover { text-decoration: underline; }
        .btn { display: inline-block; padding: 6px 14px; background: #4a90d9; color: white; text-decoration: none; border-radius: 4px; font-size: 0.9em; }
        .btn:hover { background: #357abd; }
    </style>
</head>
<body>
    <nav>
        <span>Page Carnival — Buyer</span>
        <div class="nav-links">
            <a th:href="@{/buyer/dashboard}">Dashboard</a>
            <a th:href="@{/buyer/catalog}">Browse Books</a>
            <a th:href="@{/buyer/cart}">My Cart</a>
            <form class="logout-form" th:action="@{/logout}" method="post">
                <button class="logout-btn" type="submit">Logout</button>
            </form>
        </div>
    </nav>

    <h2>Order History</h2>

    <div th:if="${#lists.isEmpty(orders)}" class="empty-msg">
        <p>You have not placed any orders yet. <a th:href="@{/buyer/catalog}">Start shopping!</a></p>
    </div>

    <div th:each="order : ${orders}" class="order-card">
        <div class="order-header">
            <span><strong>Order #</strong><span th:text="${order.orderId}"></span></span>
            <span><strong>Date:</strong> <span th:text="${order.orderDate}"></span></span>
            <span>
                <strong>Status:</strong>
                <span th:text="${order.status}"
                      th:classappend="'status-' + ${order.status}"></span>
            </span>
            <span><strong>Total:</strong> $<span th:text="${order.totalPrice}"></span></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Book</th>
                    <th>Quantity</th>
                    <th>Unit Price</th>
                    <th>Subtotal</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${order.items}">
                    <td th:text="${item.bookTitle}"></td>
                    <td th:text="${item.quantity}"></td>
                    <td th:text="'$' + ${item.unitPrice}"></td>
                    <td th:text="'$' + ${item.subtotal}"></td>
                </tr>
            </tbody>
        </table>
    </div>

    <p><a class="btn" th:href="@{/buyer/catalog}">Continue Shopping</a></p>
</body>
</html>
